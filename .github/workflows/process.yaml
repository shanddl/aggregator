name: Process

on:
  schedule:
    - cron: "05 03 * * *"
    - cron: "05 11 * * *"
  workflow_dispatch:

env:
  # time zone
  TZ: Asia/Shanghai

  # network proxy aggregate config
  SUBSCRIBE_CONF: ${{ secrets.SUBSCRIBE_CONF }}

  # token
  PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}

  # network reachable
  REACHABLE: ${{ vars.REACHABLE }}

  # not check connective
  SKIP_ALIVE_CHECK: ${{ vars.SKIP_ALIVE_CHECK }}

  # skip remark
  SKIP_REMARK: ${{ vars.SKIP_REMARK }}

  # workflow mode
  WORKFLOW_MODE: ${{ vars.WORKFLOW_MODE }}

  # include special protocols, such as vless hysteria2 and hysteria
  ENABLE_SPECIAL_PROTOCOLS: ${{ vars.ENABLE_SPECIAL_PROTOCOLS }}

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Prepare
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          architecture: "x64"
          cache: "pip"

      - name: Install
        run: pip3 install -r requirements.txt

      - name: Download and Convert to Base64
        run: |
          echo "Downloading file from ${secrets.PRIVATE_FILE_URL}"
          curl -H "Authorization: token ${{ secrets.MY_GITHUB_TOKEN }}" -o clash.yaml "${{ secrets.PRIVATE_FILE_URL }}"
          base64Content=$(cat clash.yaml | base64)
          echo "BASE64_CONTENT=${base64Content}" >> $GITHUB_ENV

      - name: Create Gist
        run: |
          echo "${{ env.BASE64_CONTENT }}" > base64_encoded.txt
          gistURL=$(curl -H "Authorization: token ${{ secrets.MY_GITHUB_TOKEN }}" \
            -X POST \
            -d '{"public":true,"files":{"base64_encoded.txt":{"content":"'"${{ env.BASE64_CONTENT }}"'"}}}' \
            https://api.github.com/gists | jq -r '.html_url')
          echo "GIST_URL=${gistURL}" >> $GITHUB_ENV

      - name: Output Gist URL
        run: echo "Gist URL: ${{ env.GIST_URL }}"

      - name: Process
        run: python -u subscribe/process.py --overwrite

      - name: Timestamp
        run: date
